services:
  postgres:
    image: postgres:16-alpine
    container_name: acorus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: acorus_wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: acorus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: acorus-api
    restart: unless-stopped
    env_file:
      - ../.env.example
    environment:
      API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/acorus_wallet
      ACORUS_ENABLE_PRISMA_STORE: "false"
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    container_name: acorus-web
    restart: unless-stopped
    env_file:
      - ../.env.example
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      WEB_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
