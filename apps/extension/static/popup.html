<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acorus Wallet</title>
    <style>
      body {
        margin: 0;
        min-width: 390px;
        width: 390px;
        min-height: 600px;
        background: #ffffff;
        color: #111827;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", Arial, Helvetica, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .wallet-shell {
        min-height: 600px;
        background:
          linear-gradient(rgba(85, 53, 160, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(85, 53, 160, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, #ffffff 0%, #fbf7ff 100%);
        background-size: 76px 76px, 76px 76px, auto;
      }

      .wallet-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px 10px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .brand-mark,
      .token-icon {
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border-radius: 999px;
        color: #ffffff;
        font-weight: 800;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, #ff46b7, #8b5cf6 55%, #38bdf8);
        box-shadow: 0 10px 24px rgba(139, 92, 246, 0.26);
      }

      .brand-title {
        font-size: 16px;
        font-weight: 760;
        line-height: 1.1;
      }

      .brand-subtitle,
      .muted {
        color: #6b7280;
      }

      .brand-subtitle {
        margin-top: 2px;
        max-width: 190px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11px;
      }

      .icon-button,
      .network-pill,
      .ghost-button,
      .primary-button,
      .danger-button {
        border: 0;
        border-radius: 999px;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        background: #f6edff;
        color: #111827;
        font-size: 18px;
      }

      .network-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        max-width: 140px;
        background: #f6edff;
        padding: 8px 10px;
        color: #111827;
        font-size: 12px;
        font-weight: 650;
      }

      .main {
        display: grid;
        gap: 14px;
        padding: 0 16px 16px;
      }

      .account-card,
      .panel,
      .notice,
      .onboarding-card {
        border: 1px solid rgba(85, 53, 160, 0.12);
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 38px rgba(85, 53, 160, 0.08);
      }

      .account-card {
        border-radius: 28px;
        padding: 18px;
      }

      .account-row,
      .row,
      .tabs,
      .quick-actions,
      .site-row {
        display: flex;
        align-items: center;
      }

      .account-row,
      .row,
      .site-row {
        justify-content: space-between;
        gap: 12px;
      }

      .account-name {
        font-size: 18px;
        font-weight: 760;
      }

      .address-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        max-width: 210px;
        border-radius: 999px;
        background: #f6edff;
        padding: 6px 9px;
        color: #4b5563;
        font-size: 12px;
        font-weight: 650;
      }

      .balance {
        margin-top: 20px;
        font-size: 42px;
        font-weight: 760;
        letter-spacing: -0.04em;
      }

      .balance-sub {
        margin-top: 3px;
        color: #16a34a;
        font-size: 13px;
        font-weight: 650;
      }

      .quick-actions {
        justify-content: space-between;
        gap: 10px;
        margin-top: 18px;
      }

      .quick-action {
        display: grid;
        justify-items: center;
        gap: 7px;
        width: 74px;
        border: 0;
        background: transparent;
        color: #111827;
        font-size: 12px;
        font-weight: 650;
      }

      .quick-action span:first-child {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: #f1f3f6;
        font-size: 20px;
      }

      .tabs {
        gap: 18px;
        border-bottom: 1px solid #eaedf2;
        padding: 0 2px;
      }

      .tab {
        position: relative;
        padding: 10px 0;
        color: #6b7280;
        font-size: 14px;
        font-weight: 720;
      }

      .tab[data-active="true"] {
        color: #111827;
      }

      .tab[data-active="true"]::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: -1px;
        left: 0;
        height: 3px;
        border-radius: 999px;
        background: linear-gradient(135deg, #ec4899, #7c3aed, #38bdf8);
      }

      .panel,
      .notice,
      .onboarding-card {
        border-radius: 22px;
        padding: 14px;
      }

      .notice {
        border-color: #fee2e2;
        background: #fff1f2;
        color: #991b1b;
        line-height: 1.45;
        font-size: 13px;
      }

      .notice.warning {
        border-color: #fde68a;
        background: #fffbeb;
        color: #92400e;
      }

      .token-list {
        display: grid;
        gap: 10px;
      }

      .token-row {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 12px;
        border-radius: 18px;
        padding: 9px 6px;
        transition: background 140ms ease, transform 140ms ease;
      }

      .token-row:hover {
        background: #faf5ff;
        transform: translateY(-1px);
      }

      .token-icon {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, #627eea, #8b5cf6);
        font-size: 13px;
        overflow: hidden;
      }

      .token-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .token-name {
        font-size: 15px;
        font-weight: 720;
      }

      .token-meta,
      .small {
        color: #6b7280;
        font-size: 12px;
        line-height: 1.35;
      }

      .token-value {
        text-align: right;
        font-size: 14px;
        font-weight: 720;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        background: #eef2ff;
        padding: 4px 8px;
        color: #3730a3;
        font-size: 11px;
        font-weight: 760;
      }

      .badge.green {
        background: #dcfce7;
        color: #166534;
      }

      .status-pill {
        border-radius: 999px;
        padding: 7px 9px;
        font-size: 11px;
        font-weight: 760;
      }

      .status-pill.ok {
        background: #dcfce7;
        color: #166534;
      }

      .status-pill.locked {
        background: #fee2e2;
        color: #991b1b;
      }

      .primary-button,
      .ghost-button,
      .danger-button {
        padding: 10px 13px;
        font-size: 13px;
        font-weight: 760;
      }

      .primary-button {
        background: linear-gradient(135deg, #ff37bd, #8b5cf6 58%, #38bdf8);
        color: #ffffff;
        box-shadow: 0 16px 34px rgba(139, 92, 246, 0.28);
      }

      .ghost-button {
        border: 1px solid #e5e7eb;
        background: #ffffff;
        color: #111827;
      }

      .danger-button {
        background: #fee2e2;
        color: #991b1b;
      }

      .form {
        display: grid;
        gap: 10px;
      }

      .field {
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #ffffff;
        padding: 11px 12px;
        color: #111827;
        outline: none;
      }

      .field:focus {
        border-color: #0500ff;
        box-shadow: 0 0 0 4px rgba(5, 0, 255, 0.08);
      }

      .seed-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .seed-word {
        border: 1px solid #fde68a;
        border-radius: 12px;
        background: #fffbeb;
        padding: 8px;
        color: #111827;
        font-size: 12px;
      }

      .section-title {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 760;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .copy {
        margin: 0;
        color: #4b5563;
        font-size: 13px;
        line-height: 1.5;
      }

      .as-button {
        border: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        text-align: left;
      }

      .as-button.wide {
        width: 100%;
      }

      .network-grid {
        display: grid;
        gap: 12px;
        max-height: 280px;
        overflow: auto;
      }

      .network-group {
        display: grid;
        gap: 8px;
      }

      .network-group-label {
        padding: 2px 4px;
        color: #6b7280;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .network-card {
        display: flex;
        gap: 10px;
        align-items: center;
        width: 100%;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.82);
        padding: 10px 12px;
        color: #111827;
        cursor: pointer;
      }

      .network-card.active {
        border-color: rgba(99, 102, 241, 0.75);
        box-shadow: 0 10px 26px rgba(99, 102, 241, 0.16);
      }

      .network-card span:last-child {
        display: grid;
        gap: 2px;
      }

      .network-card small {
        color: #6b7280;
        font-size: 11px;
      }

      .capability-row,
      .risk-labels {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .capability-badge {
        border-radius: 999px;
        padding: 2px 6px;
        font-size: 9px;
        font-weight: 800;
      }

      .capability-badge.on {
        background: #dcfce7;
        color: #166534;
      }

      .capability-badge.off {
        background: #f3f4f6;
        color: #9ca3af;
      }

      .account-option {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #ffffff;
        padding: 10px 12px;
        color: #111827;
        text-align: left;
      }

      .account-option.active {
        border-color: #8b5cf6;
        box-shadow: 0 10px 24px rgba(139, 92, 246, 0.16);
      }

      .account-option.disabled {
        color: #6b7280;
      }

      .account-option span:first-child {
        display: grid;
        gap: 3px;
      }

      .account-option small {
        color: #6b7280;
        font-size: 11px;
      }

      .muted-badge {
        background: #f3f4f6;
        color: #6b7280;
      }

      .approval-card {
        margin-top: 10px;
        border: 1px solid rgba(146, 64, 14, 0.18);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.7);
        padding: 10px;
      }

      .approval-card dl {
        display: grid;
        gap: 6px;
        margin: 10px 0 0;
      }

      .approval-card dl div {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .approval-card dt {
        color: #92400e;
        font-size: 11px;
        font-weight: 800;
      }

      .approval-card dd {
        margin: 0;
        max-width: 190px;
        overflow: hidden;
        text-align: right;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #111827;
        font-size: 12px;
        font-weight: 700;
      }

      .risk-labels span {
        border-radius: 999px;
        background: #fef3c7;
        padding: 3px 7px;
        color: #92400e;
        font-size: 10px;
        font-weight: 800;
      }

      .network-dot {
        width: 32px;
        height: 32px;
        flex: 0 0 auto;
        border-radius: 999px;
      }

      .compact {
        max-width: 130px;
      }

      .receive-box {
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 18px;
        background: rgba(248, 250, 252, 0.9);
        padding: 10px;
      }

      .token-row {
        border: 0;
      }

      .hero-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .hero-action {
        display: grid;
        gap: 12px;
        min-height: 92px;
        border: 0;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(236, 72, 153, 0.14), rgba(124, 58, 237, 0.08));
        padding: 16px;
        color: #ff37bd;
        text-align: left;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .hero-action span {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        border-radius: 999px;
        background: #ff37bd;
        color: #ffffff;
        font-size: 17px;
        font-weight: 900;
      }

      .hero-action strong {
        font-size: 16px;
      }

      .portfolio-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        margin-top: 14px;
        border: 1px solid rgba(85, 53, 160, 0.12);
        border-radius: 999px;
        background: #ffffff;
        padding: 12px 14px;
        color: #111827;
        font-weight: 760;
      }

      .portfolio-button span {
        font-size: 20px;
        line-height: 1;
      }

      .compact-portfolio {
        margin-top: 2px;
        width: auto;
        justify-content: flex-start;
        padding-inline: 14px;
      }

      .mini-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .mini-actions .quick-action {
        display: inline-flex;
        justify-content: center;
        width: auto;
        flex: 1;
        gap: 8px;
        border: 1px solid #f5d0fe;
        border-radius: 999px;
        background: #ffffff;
        padding: 9px 10px;
        color: #7c3aed;
      }

      .mini-actions .quick-action span:first-child {
        width: auto;
        height: auto;
        border-radius: 0;
        background: transparent;
        font-size: 14px;
      }

      .settings-sheet {
        display: grid;
        gap: 8px;
        color: #111827;
      }

      .settings-back {
        width: max-content;
        color: #374151;
        font-size: 18px;
        font-weight: 650;
      }

      .settings-section-label {
        margin-top: 8px;
        color: #737373;
        font-size: 15px;
      }

      .settings-row {
        display: grid;
        grid-template-columns: 34px 1fr auto;
        align-items: center;
        gap: 12px;
        min-height: 54px;
        border-radius: 16px;
        padding: 7px 2px;
      }

      .settings-icon {
        display: grid;
        place-items: center;
        color: #6b7280;
        font-size: 21px;
        font-weight: 760;
      }

      .settings-label {
        font-size: 17px;
        font-weight: 560;
      }

      .settings-value {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #737373;
        font-size: 15px;
        font-weight: 650;
      }

      .mini-select {
        max-width: 112px;
        border: 1px solid #e9d5ff;
        border-radius: 999px;
        background: #ffffff;
        color: #111827;
        font: inherit;
        padding: 7px 10px;
      }

      .settings-link {
        border: 0;
        background: transparent;
        color: #7c3aed;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
      }

      .activity-row {
        grid-template-columns: 34px 1fr auto;
        border: 1px solid rgba(139, 92, 246, 0.12);
        background: rgba(255, 255, 255, 0.58);
        padding: 10px;
      }

      .segmented {
        display: inline-grid;
        grid-template-columns: repeat(3, 1fr);
        align-items: center;
        overflow: hidden;
        border: 1px solid #e5e7eb;
        border-radius: 999px;
        background: #ffffff;
        padding: 4px;
        color: #6b7280;
      }

      .segmented span {
        display: grid;
        min-width: 42px;
        place-items: center;
        border-radius: 999px;
        padding: 6px 8px;
      }

      .segmented span:first-child {
        background: #f3f4f6;
        color: #111827;
      }

      .toggle {
        position: relative;
        display: inline-flex;
        align-items: center;
        width: 54px;
        height: 30px;
        border-radius: 999px;
        background: #a3a3a3;
        padding: 3px;
      }

      .toggle span {
        display: block;
        width: 24px;
        height: 24px;
        border-radius: 999px;
        background: #ffffff;
      }

      .toggle.on {
        justify-content: flex-end;
        background: #ff37bd;
      }

      .toggle.on span::after {
        content: "✓";
        display: grid;
        place-items: center;
        height: 100%;
        color: #ff37bd;
        font-size: 13px;
        font-weight: 900;
      }

      /* Magic glass alignment with the web app */
      body {
        background:
          radial-gradient(circle at 12% 0%, rgba(124, 247, 255, 0.28), transparent 30%),
          radial-gradient(circle at 85% 0%, rgba(255, 122, 223, 0.22), transparent 28%),
          linear-gradient(180deg, #fbfdff 0%, #f3edff 100%);
      }

      .wallet-shell {
        background:
          linear-gradient(rgba(85, 166, 255, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(85, 166, 255, 0.05) 1px, transparent 1px),
          radial-gradient(circle at 52% 0%, rgba(124, 247, 255, 0.24), transparent 30%),
          linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(244,237,255,0.9) 100%);
        background-size: 58px 58px, 58px 58px, auto, auto;
      }

      .brand-mark,
      .token-icon {
        background:
          radial-gradient(circle at 35% 30%, #ffffff 0%, #7cf7ff 18%, #8b5cf6 55%, #ff7adf 100%);
        box-shadow: 0 0 24px rgba(124, 247, 255, 0.38), 0 14px 28px rgba(139, 92, 246, 0.22);
      }

      .account-card,
      .panel,
      .notice,
      .onboarding-card,
      .settings-page {
        border-color: rgba(230, 250, 255, 0.72);
        background: linear-gradient(145deg, rgba(255,255,255,0.78), rgba(255,255,255,0.36));
        box-shadow: 0 18px 50px rgba(32, 92, 155, 0.14);
        backdrop-filter: blur(22px) saturate(1.25);
      }

      .primary-button,
      .portfolio-button {
        background: linear-gradient(135deg, #7cf7ff 0%, #8b5cf6 48%, #ff7adf 78%, #ffd166 100%);
        color: #ffffff;
        box-shadow: 0 14px 32px rgba(139, 92, 246, 0.26);
      }

      .hero-action span,
      .quick-action span:first-child {
        background: rgba(255, 255, 255, 0.58);
        color: #7c3aed;
      }

      .network-pill,
      .address-pill,
      .icon-button {
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid rgba(230, 250, 255, 0.72);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./popup/index.js"></script>
  </body>
</html>
